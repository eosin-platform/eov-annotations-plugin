name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux
    uses: ./.github/workflows/build-linux-eop.yml

  build-macos:
    name: macOS
    uses: ./.github/workflows/build-macos-eop.yml

  build-windows:
    name: Windows
    uses: ./.github/workflows/build-windows-eop.yml

  publish-release:
    name: Publish GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Validate release ref
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release workflow must run on a version tag, got '$tag'" >&2
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          find artifacts -type f \( -name '*.eop' -o -name '*.sha256' \) -exec cp {} release-files/ \;

          echo "Release files:"
          ls -la release-files/

      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Annotations ${{ steps.meta.outputs.version }}
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: release-files/*